    # HikariCP 连接池配置
    hikari:
      # 连接池最大连接数（默认 10）
      maximum-pool-size: 5
      # 最小空闲连接数（默认与 maximum-pool-size 相同）
      minimum-idle: 2
      # 连接超时时间，毫秒（默认 30000 = 30秒）
      connection-timeout: 20000
      # 空闲连接超时时间，毫秒（默认 600000 = 10分钟）
      idle-timeout: 300000
      # 连接最大生命周期，毫秒（默认 1800000 = 30分钟）
      max-lifetime: 1200000

  data:
