server:
  port: 9999
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost/xdb?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      port: 6379
      host: localhost

logging:
  level:
    com.diy: debug

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
  type-aliases-package: com.diy.*.entity